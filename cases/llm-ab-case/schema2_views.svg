<svg viewBox="0 0 680 250" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t2 d2" font-family="Manrope, system-ui, sans-serif">
  <title id="t2">Три процесса видят три разные правды об одном эксперименте</title>
  <desc id="d2">A/B-аналитик видит успех, продуктовая аналитика видит падение retention, ML-команда видит дефект классификатора. По отдельности каждый прав, но не объясняет причину. Полная картина складывается только из трёх взглядов вместе.</desc>
  <defs>
    <marker id="ar2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="30" y="36" width="190" height="74" rx="2" fill="#e6f1fb" stroke="#185fa5" stroke-width="1"/>
  <text x="125" y="60" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1a1a">A/B-аналитик</text>
  <text x="125" y="80" text-anchor="middle" font-size="12" fill="#6b6b6b">«успех, +20.9%»</text>
  <text x="125" y="97" text-anchor="middle" font-size="12" fill="#6b6b6b">выкатываем</text>

  <rect x="245" y="36" width="190" height="74" rx="2" fill="#e1f5ee" stroke="#0f6e56" stroke-width="1"/>
  <text x="340" y="60" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1a1a">Продуктовая аналитика</text>
  <text x="340" y="80" text-anchor="middle" font-size="12" fill="#6b6b6b">«retention падает»</text>
  <text x="340" y="97" text-anchor="middle" font-size="12" fill="#6b6b6b">тревога</text>

  <rect x="460" y="36" width="190" height="74" rx="2" fill="#faeeda" stroke="#b9791f" stroke-width="1"/>
  <text x="555" y="60" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1a1a">ML-команда</text>
  <text x="555" y="80" text-anchor="middle" font-size="12" fill="#6b6b6b">«классификатор врёт»</text>
  <text x="555" y="97" text-anchor="middle" font-size="12" fill="#6b6b6b">в хвосте</text>

  <line x1="125" y1="110" x2="318" y2="180" stroke="#6b6b6b" stroke-width="1.2" marker-end="url(#ar2)"/>
  <line x1="340" y1="110" x2="340" y2="180" stroke="#6b6b6b" stroke-width="1.2" marker-end="url(#ar2)"/>
  <line x1="555" y1="110" x2="362" y2="180" stroke="#6b6b6b" stroke-width="1.2" marker-end="url(#ar2)"/>

  <rect x="190" y="182" width="300" height="58" rx="2" fill="#f1efe8" stroke="#d4d4d0" stroke-width="1"/>
  <text x="340" y="206" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1a1a">Полная картина — только вместе</text>
  <text x="340" y="225" text-anchor="middle" font-size="12" fill="#6b6b6b">причинная цепочка видна на стыке трёх</text>
</svg>
