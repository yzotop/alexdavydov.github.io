<svg viewBox="0 0 680 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t1 d1" font-family="Manrope, system-ui, sans-serif">
  <title id="t1">Причинная цепочка: дефект классификатора искажает A/B и монетизацию</title>
  <desc id="d1">Дефект LLM-классификатора в длинном хвосте категорий приводит к нерелевантной выдаче нового алгоритма ранжирования; это даёт ложный прирост выручки в A/B и одновременно роняет retention — наивный вывод «выкатываем» оказывается ошибочным.</desc>
  <defs>
    <marker id="ar1" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="40" y="40" width="240" height="58" rx="2" fill="#fdeaec" stroke="#e63946" stroke-width="1"/>
  <text x="160" y="64" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1a1a">Дефект классификатора</text>
  <text x="160" y="83" text-anchor="middle" font-size="12" fill="#6b6b6b">точность падает в хвосте</text>

  <rect x="40" y="151" width="240" height="58" rx="2" fill="#faeeda" stroke="#b9791f" stroke-width="1"/>
  <text x="160" y="175" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1a1a">Искажение ранжирования</text>
  <text x="160" y="194" text-anchor="middle" font-size="12" fill="#6b6b6b">нерелевантная выдача</text>

  <rect x="400" y="40" width="240" height="58" rx="2" fill="#f1efe8" stroke="#d4d4d0" stroke-width="1"/>
  <text x="520" y="64" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1a1a">A/B: выручка +20.9%</text>
  <text x="520" y="83" text-anchor="middle" font-size="12" fill="#6b6b6b">сигнал «выкатываем»</text>

  <rect x="400" y="151" width="240" height="58" rx="2" fill="#f1efe8" stroke="#d4d4d0" stroke-width="1"/>
  <text x="520" y="172" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1a1a">Монетизация: retention −5.6%</text>
  <text x="520" y="191" text-anchor="middle" font-size="12" fill="#6b6b6b">отток в хвосте</text>

  <rect x="220" y="272" width="240" height="58" rx="2" fill="#fdeaec" stroke="#e63946" stroke-width="1"/>
  <text x="340" y="296" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1a1a">Ложный вывод</text>
  <text x="340" y="315" text-anchor="middle" font-size="12" fill="#6b6b6b">прирост частично фальшивый</text>

  <line x1="160" y1="98" x2="160" y2="149" stroke="#6b6b6b" stroke-width="1.2" marker-end="url(#ar1)"/>
  <line x1="280" y1="172" x2="398" y2="80" stroke="#6b6b6b" stroke-width="1.2" marker-end="url(#ar1)"/>
  <line x1="280" y1="186" x2="398" y2="186" stroke="#6b6b6b" stroke-width="1.2" marker-end="url(#ar1)"/>
  <line x1="500" y1="98" x2="418" y2="270" stroke="#6b6b6b" stroke-width="1.2" marker-end="url(#ar1)"/>
  <line x1="540" y1="209" x2="420" y2="270" stroke="#6b6b6b" stroke-width="1.2" marker-end="url(#ar1)"/>
</svg>
