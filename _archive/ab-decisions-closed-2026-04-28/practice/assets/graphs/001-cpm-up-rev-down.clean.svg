<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">

  <!-- Оси -->
  <line x1="60" y1="340" x2="740" y2="340" stroke="#0a0a0a" stroke-width="1"/>
  <line x1="60" y1="340" x2="60" y2="60" stroke="#0a0a0a" stroke-width="1"/>

  <!-- Сетка вертикальная (дни) -->
  <g stroke="#e5e5e5" stroke-width="0.5">
    <line x1="120" y1="60" x2="120" y2="340"/>
    <line x1="180" y1="60" x2="180" y2="340"/>
    <line x1="240" y1="60" x2="240" y2="340"/>
    <line x1="300" y1="60" x2="300" y2="340"/>
    <line x1="360" y1="60" x2="360" y2="340"/>
    <line x1="420" y1="60" x2="420" y2="340"/>
    <line x1="480" y1="60" x2="480" y2="340"/>
    <line x1="540" y1="60" x2="540" y2="340"/>
    <line x1="600" y1="60" x2="600" y2="340"/>
    <line x1="660" y1="60" x2="660" y2="340"/>
    <line x1="720" y1="60" x2="720" y2="340"/>
  </g>

  <!-- Сетка горизонтальная -->
  <g stroke="#e5e5e5" stroke-width="0.5">
    <line x1="60" y1="280" x2="740" y2="280"/>
    <line x1="60" y1="220" x2="740" y2="220"/>
    <line x1="60" y1="160" x2="740" y2="160"/>
    <line x1="60" y1="100" x2="740" y2="100"/>
  </g>

  <!-- Контрольная группа: CPM (пунктир, серый) -->
  <polyline points="80,240 120,240 180,240 240,240 300,239 360,239 420,239 480,238 540,238 600,238 660,237 720,237"
            fill="none" stroke="#a3a3a3" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.8"/>

  <!-- Контрольная группа: Revenue (пунктир, серый) -->
  <polyline points="80,180 120,180 180,181 240,181 300,181 360,182 420,182 480,182 540,183 600,183 660,183 720,183"
            fill="none" stroke="#a3a3a3" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.8"/>

  <!-- Тестовая группа: CPM (растёт) -->
  <polyline points="80,240 120,238 180,235 240,232 300,228 360,225 420,222 480,219 540,216 600,214 660,212 720,210"
            fill="none" stroke="#0a0a0a" stroke-width="2"/>

  <!-- Тестовая группа: Revenue (падает) -->
  <!-- ИСПРАВЛЕНО: y увеличивается = линия идёт вниз = выручка снижается -->
  <polyline points="80,180 120,182 180,184 240,186 300,188 360,190 420,192 480,194 540,196 600,197 660,198 720,198"
            fill="none" stroke="#e63946" stroke-width="2"/>

  <!-- Подпись оси X -->
  <text x="400" y="372" fill="#737373" font-size="11" font-family="'Geist Mono', ui-monospace, monospace" text-anchor="middle">Дни эксперимента</text>

  <!-- Подпись оси Y -->
  <text x="18" y="200" fill="#737373" font-size="11" font-family="'Geist Mono', ui-monospace, monospace" text-anchor="middle" transform="rotate(-90,18,200)">Индекс (день 0 = 1,0)</text>

  <!-- Метки дней -->
  <text x="80" y="355" fill="#737373" font-size="10" font-family="'Geist Mono', ui-monospace, monospace" text-anchor="middle">0</text>
  <text x="300" y="355" fill="#737373" font-size="10" font-family="'Geist Mono', ui-monospace, monospace" text-anchor="middle">7</text>
  <text x="720" y="355" fill="#737373" font-size="10" font-family="'Geist Mono', ui-monospace, monospace" text-anchor="middle">14</text>

  <!-- Метки значений (левая ось) -->
  <text x="52" y="283" fill="#737373" font-size="10" font-family="'Geist Mono', ui-monospace, monospace" text-anchor="end">0,8</text>
  <text x="52" y="222" fill="#737373" font-size="10" font-family="'Geist Mono', ui-monospace, monospace" text-anchor="end">1,0</text>
  <text x="52" y="162" fill="#737373" font-size="10" font-family="'Geist Mono', ui-monospace, monospace" text-anchor="end">1,2</text>
  <text x="52" y="102" fill="#737373" font-size="10" font-family="'Geist Mono', ui-monospace, monospace" text-anchor="end">1,4</text>

  <!-- Легенда -->
  <g font-family="'Geist Mono', ui-monospace, monospace" font-size="10">
    <line x1="76" y1="80" x2="106" y2="80" stroke="#0a0a0a" stroke-width="2"/>
    <text x="112" y="84" fill="#0a0a0a">CPM (тест)</text>
    <line x1="210" y1="80" x2="240" y2="80" stroke="#e63946" stroke-width="2"/>
    <text x="246" y="84" fill="#e63946">Revenue (тест)</text>
    <line x1="380" y1="80" x2="410" y2="80" stroke="#a3a3a3" stroke-width="1.5" stroke-dasharray="4,4"/>
    <text x="416" y="84" fill="#737373">Контроль</text>
  </g>

</svg>
