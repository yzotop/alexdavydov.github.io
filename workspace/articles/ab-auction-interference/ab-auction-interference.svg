<svg viewBox="0 0 680 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="svgtitle svgdesc" font-family="Manrope, system-ui, sans-serif">
  <title id="svgtitle">Как общий бюджет иссякает за день и смещает оценку A/B-теста</title>
  <desc id="svgdesc">Сверху три момента дня: утром тест и контроль оба показывают рекламодателя при полном бюджете; днём бюджет наполовину истрачен, причём тест съел большую долю; вечером бюджет кончился и контроль остался без рекламодателя. Снизу: A/B-тест измерил +6%, но это раскладывается на истинный эффект +2% и смещение +4% — бюджет, отнятый тестом у контроля.</desc>

  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ===== Верхний заголовок ===== -->
  <text x="32" y="28" font-size="15" font-weight="600" fill="#1a1a1a">Один рекламодатель за день — общий бюджет на обе группы</text>

  <!-- ===== Три момента дня: рамки ===== -->
  <rect x="32"  y="44" width="196" height="190" rx="2" fill="none" stroke="#d4d4d0" stroke-width="1"/>
  <rect x="242" y="44" width="196" height="190" rx="2" fill="none" stroke="#d4d4d0" stroke-width="1"/>
  <rect x="452" y="44" width="196" height="190" rx="2" fill="none" stroke="#d4d4d0" stroke-width="1"/>

  <text x="130" y="68" text-anchor="middle" font-family="'Geist Mono', monospace" font-size="12" letter-spacing="0.08em" fill="#1a1a1a">УТРО</text>
  <text x="340" y="68" text-anchor="middle" font-family="'Geist Mono', monospace" font-size="12" letter-spacing="0.08em" fill="#1a1a1a">ДЕНЬ</text>
  <text x="550" y="68" text-anchor="middle" font-family="'Geist Mono', monospace" font-size="12" letter-spacing="0.08em" fill="#1a1a1a">ВЕЧЕР</text>

  <!-- стрелки между моментами -->
  <line x1="228" y1="139" x2="242" y2="139" stroke="#6b6b6b" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="438" y1="139" x2="452" y2="139" stroke="#6b6b6b" stroke-width="1.2" marker-end="url(#ar)"/>

  <!-- ===== Бюджетные полоски ===== -->
  <!-- Утро: полный -->
  <text x="130" y="92" text-anchor="middle" font-size="11.5" fill="#6b6b6b">бюджет полный</text>
  <rect x="64" y="102" width="132" height="22" rx="1" fill="#e9a23b"/>
  <rect x="64" y="102" width="132" height="22" rx="1" fill="none" stroke="#b9791f" stroke-width="0.75"/>

  <!-- День: половина (тест съел больше) -->
  <text x="340" y="92" text-anchor="middle" font-size="11.5" fill="#6b6b6b">истрачено наполовину</text>
  <rect x="274" y="102" width="132" height="22" rx="1" fill="#fff"/>
  <rect x="274" y="102" width="66"  height="22" fill="#e9a23b"/>
  <rect x="340" y="102" width="44"  height="22" fill="#2b6cb0"/>
  <rect x="384" y="102" width="22"  height="22" fill="#9a9a93"/>
  <rect x="274" y="102" width="132" height="22" rx="1" fill="none" stroke="#b9791f" stroke-width="0.75"/>

  <!-- Вечер: пусто (почти всё выкачал тест) -->
  <text x="550" y="92" text-anchor="middle" font-size="11.5" fill="#6b6b6b">бюджет кончился</text>
  <rect x="484" y="102" width="132" height="22" rx="1" fill="#fff"/>
  <rect x="484" y="102" width="92"  height="22" fill="#2b6cb0"/>
  <rect x="576" y="102" width="40"  height="22" fill="#9a9a93"/>
  <rect x="484" y="102" width="132" height="22" rx="1" fill="none" stroke="#b9791f" stroke-width="0.75"/>

  <!-- ===== Строки «кто видит рекламодателя» ===== -->
  <!-- Утро -->
  <rect x="56" y="150" width="148" height="30" rx="2" fill="#f1efe8" stroke="#d4d4d0" stroke-width="0.75"/>
  <text x="130" y="169" text-anchor="middle" font-size="11.5" fill="#444441">контроль · видит</text>
  <rect x="56" y="188" width="148" height="30" rx="2" fill="#e6eef7" stroke="#2b6cb0" stroke-width="0.75"/>
  <text x="130" y="207" text-anchor="middle" font-size="11.5" fill="#1d4e80">тест · видит</text>

  <!-- День -->
  <rect x="266" y="150" width="148" height="30" rx="2" fill="#f1efe8" stroke="#d4d4d0" stroke-width="0.75"/>
  <text x="340" y="169" text-anchor="middle" font-size="11.5" fill="#444441">контроль · реже</text>
  <rect x="266" y="188" width="148" height="30" rx="2" fill="#e6eef7" stroke="#2b6cb0" stroke-width="0.75"/>
  <text x="340" y="207" text-anchor="middle" font-size="11.5" fill="#1d4e80">тест · часто</text>

  <!-- Вечер -->
  <rect x="476" y="150" width="148" height="30" rx="2" fill="none" stroke="#e63946" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="550" y="169" text-anchor="middle" font-size="11.5" fill="#e63946">контроль · остался без</text>
  <rect x="476" y="188" width="148" height="30" rx="2" fill="none" stroke="#b4b2a9" stroke-width="0.75" stroke-dasharray="4 3"/>
  <text x="550" y="207" text-anchor="middle" font-size="11.5" fill="#888780">тест · уже истратил</text>

  <!-- подпись под моментами -->
  <text x="340" y="252" text-anchor="middle" font-size="11.5" fill="#6b6b6b">синим — доля бюджета, выкачанная тестом; тест опустошает пул быстрее</text>

  <!-- ===== Связка верх → низ ===== -->
  <line x1="340" y1="270" x2="340" y2="300" stroke="#6b6b6b" stroke-width="1.2" marker-end="url(#ar)"/>
  <text x="352" y="288" font-family="'Geist Mono', monospace" font-size="11" letter-spacing="0.04em" fill="#6b6b6b">итог за день</text>

  <!-- ===== Нижний заголовок ===== -->
  <text x="32" y="330" font-size="15" font-weight="600" fill="#1a1a1a">Что из этого видит аналитик</text>

  <!-- Измерено -->
  <rect x="32" y="346" width="616" height="56" rx="2" fill="#e6eef7" stroke="#2b6cb0" stroke-width="0.75"/>
  <text x="52" y="370" font-size="14" font-weight="600" fill="#1d4e80">Измерено: тест +6%</text>
  <text x="52" y="389" font-size="11.5" fill="#3a6494">прямая разница средних между группами — то, что показал A/B</text>

  <!-- Истинный + Смещение -->
  <rect x="32" y="418" width="248" height="56" rx="2" fill="#e4f1ea" stroke="#2f8f6b" stroke-width="0.75"/>
  <text x="156" y="442" text-anchor="middle" font-size="14" font-weight="600" fill="#1f6b4f">Истинный эффект +2%</text>
  <text x="156" y="461" text-anchor="middle" font-size="11.5" fill="#2f7d5e">реальная польза алгоритма</text>

  <text x="298" y="451" text-anchor="middle" font-size="18" font-weight="600" fill="#6b6b6b">+</text>

  <rect x="316" y="418" width="332" height="56" rx="2" fill="#fdeaec" stroke="#e63946" stroke-width="0.75"/>
  <text x="482" y="442" text-anchor="middle" font-size="14" font-weight="600" fill="#c1121f">Смещение +4%</text>
  <text x="482" y="461" text-anchor="middle" font-size="11.5" fill="#b5202c">бюджет, отнятый тестом у контроля</text>

  <!-- финальные подписи -->
  <text x="340" y="500" text-anchor="middle" font-size="11.5" fill="#6b6b6b">две трети «прироста» — не польза алгоритма, а артефакт перетока бюджета</text>
  <text x="340" y="520" text-anchor="middle" font-size="11.5" fill="#6b6b6b">знак ошибки заранее непредсказуем: тест может казаться и лучше, и хуже</text>
</svg>
