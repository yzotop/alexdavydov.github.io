<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 760 295" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="h" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#d4d4d0" stroke-width="2.5"/>
    </pattern>
  </defs>

  <!-- Row labels -->
  <text x="142" y="68" text-anchor="end" font-size="10" font-weight="700" font-family="ui-monospace,Menlo,Consolas,monospace" fill="#1a1a1a">ТЕСТ</text>
  <text x="142" y="82" text-anchor="end" font-size="9" font-family="ui-monospace,Menlo,Consolas,monospace" fill="#6b6b6b">новый алгоритм</text>
  <text x="142" y="132" text-anchor="end" font-size="10" font-weight="700" font-family="ui-monospace,Menlo,Consolas,monospace" fill="#1a1a1a">БЮДЖЕТ X</text>
  <text x="142" y="146" text-anchor="end" font-size="9" font-family="ui-monospace,Menlo,Consolas,monospace" fill="#6b6b6b">общий пул</text>
  <text x="142" y="195" text-anchor="end" font-size="10" font-weight="700" font-family="ui-monospace,Menlo,Consolas,monospace" fill="#1a1a1a">КОНТРОЛЬ</text>
  <text x="142" y="209" text-anchor="end" font-size="9" font-family="ui-monospace,Menlo,Consolas,monospace" fill="#6b6b6b">старый алгоритм</text>

  <!-- Separator lines -->
  <line x1="148" y1="108" x2="720" y2="108" stroke="#d4d4d0" stroke-width="1"/>
  <line x1="148" y1="160" x2="720" y2="160" stroke="#d4d4d0" stroke-width="1"/>

  <!-- ТЕСТ row: dense blocks (06:00–~13:00) -->
  <rect x="150" y="52" width="22" height="46" fill="#1a1a1a" rx="1"/>
  <rect x="176" y="52" width="22" height="46" fill="#1a1a1a" rx="1"/>
  <rect x="202" y="52" width="22" height="46" fill="#1a1a1a" rx="1"/>
  <rect x="228" y="52" width="22" height="46" fill="#1a1a1a" rx="1"/>
  <rect x="254" y="52" width="22" height="46" fill="#1a1a1a" rx="1"/>
  <rect x="280" y="52" width="22" height="46" fill="#1a1a1a" rx="1"/>
  <rect x="306" y="52" width="22" height="46" fill="#1a1a1a" rx="1"/>
  <rect x="332" y="52" width="22" height="46" fill="#1a1a1a" rx="1"/>
  <rect x="358" y="52" width="22" height="46" fill="#1a1a1a" rx="1"/>
  <!-- ТЕСТ after exhaustion -->
  <rect x="404" y="52" width="316" height="46" fill="url(#h)" rx="1"/>
  <text x="562" y="79" text-anchor="middle" font-size="10" font-family="ui-monospace,Menlo,Consolas,monospace" fill="#9b9b9b">нет рекламодателя X</text>

  <!-- Budget bar -->
  <rect x="150" y="119" width="570" height="24" fill="#f5f5f3" stroke="#d4d4d0" stroke-width="1" rx="1"/>
  <rect x="150" y="119" width="250" height="24" fill="#1a1a1a" rx="1"/>
  <text x="275" y="135" text-anchor="middle" font-size="9" font-family="ui-monospace,Menlo,Consolas,monospace" fill="#f5f5f3" font-weight="600">тест расходует быстрее</text>
  <text x="557" y="135" text-anchor="middle" font-size="9" font-family="ui-monospace,Menlo,Consolas,monospace" fill="#9b9b9b">исчерпан</text>

  <!-- КОНТРОЛЬ row: sparse blocks (06:00–~13:00) -->
  <rect x="152" y="168" width="22" height="46" fill="#6b6b6b" rx="1"/>
  <rect x="258" y="168" width="22" height="46" fill="#6b6b6b" rx="1"/>
  <rect x="364" y="168" width="22" height="46" fill="#6b6b6b" rx="1"/>
  <!-- КОНТРОЛЬ after exhaustion (red) -->
  <rect x="404" y="168" width="316" height="46" fill="url(#h)" rx="1"/>
  <text x="562" y="188" text-anchor="middle" font-size="10" font-family="ui-monospace,Menlo,Consolas,monospace" fill="#e63946" font-weight="700">нет рекламодателя X</text>
  <text x="562" y="204" text-anchor="middle" font-size="9" font-family="ui-monospace,Menlo,Consolas,monospace" fill="#e63946">хотя алгоритм не менялся</text>

  <!-- Vertical exhaustion line -->
  <line x1="400" y1="40" x2="400" y2="225" stroke="#e63946" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="396,222 404,222 400,231" fill="#e63946"/>
  <text x="404" y="32" font-size="9" font-family="ui-monospace,Menlo,Consolas,monospace" fill="#e63946" font-weight="600">бюджет исчерпан (~13:00)</text>

  <!-- Time axis -->
  <line x1="150" y1="230" x2="720" y2="230" stroke="#d4d4d0" stroke-width="1"/>
  <line x1="150" y1="229" x2="150" y2="237" stroke="#d4d4d0" stroke-width="1"/>
  <line x1="293" y1="229" x2="293" y2="237" stroke="#d4d4d0" stroke-width="1"/>
  <line x1="436" y1="229" x2="436" y2="237" stroke="#d4d4d0" stroke-width="1"/>
  <line x1="578" y1="229" x2="578" y2="237" stroke="#d4d4d0" stroke-width="1"/>
  <line x1="720" y1="229" x2="720" y2="237" stroke="#d4d4d0" stroke-width="1"/>
  <text x="150" y="249" text-anchor="middle" font-size="9" font-family="ui-monospace,Menlo,Consolas,monospace" fill="#6b6b6b">06:00</text>
  <text x="293" y="249" text-anchor="middle" font-size="9" font-family="ui-monospace,Menlo,Consolas,monospace" fill="#6b6b6b">10:00</text>
  <text x="436" y="249" text-anchor="middle" font-size="9" font-family="ui-monospace,Menlo,Consolas,monospace" fill="#6b6b6b">14:00</text>
  <text x="578" y="249" text-anchor="middle" font-size="9" font-family="ui-monospace,Menlo,Consolas,monospace" fill="#6b6b6b">18:00</text>
  <text x="720" y="249" text-anchor="middle" font-size="9" font-family="ui-monospace,Menlo,Consolas,monospace" fill="#6b6b6b">22:00</text>

  <!-- Bottom annotation -->
  <rect x="150" y="259" width="570" height="31" fill="none" stroke="#e63946" stroke-width="1.5" rx="1"/>
  <text x="435" y="278" text-anchor="middle" font-size="10" font-family="ui-monospace,Menlo,Consolas,monospace" fill="#e63946" font-weight="700">СМЕЩЕНИЕ: контроль потерял X не из-за алгоритма — из-за теста</text>
</svg>
