<svg viewBox="0 0 680 340" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="tm dm" font-family="Manrope, system-ui, sans-serif">
  <title id="tm">Двусторонний рынок: treatment через общий пул водителей вредит контролю</title>
  <desc id="dm">Пассажиры со скидкой (treatment) заказывают чаще и расхватывают водителей из общего пула. Контрольной группе, которой ничего не меняли, достаётся меньше водителей — её время ожидания растёт, завершённость падает. Группы связаны через общий ресурс, поэтому простая разница между ними завышает эффект.</desc>
  <defs>
    <marker id="arm" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- общий пул водителей в центре -->
  <rect x="260" y="138" width="160" height="64" rx="2" fill="#faeeda" stroke="#b9791f" stroke-width="1.5"/>
  <text x="340" y="163" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1a1a">Общий пул</text>
  <text x="340" y="184" text-anchor="middle" font-size="12" fill="#6b6b6b">водителей (дефицит)</text>

  <!-- treatment слева -->
  <rect x="40" y="50" width="200" height="60" rx="2" fill="#f1efe8" stroke="#1a1a1a" stroke-width="1"/>
  <text x="140" y="74" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1a1a">Treatment (скидка)</text>
  <text x="140" y="93" text-anchor="middle" font-size="12" fill="#6b6b6b">заказывают чаще</text>

  <!-- control слева внизу -->
  <rect x="40" y="230" width="200" height="60" rx="2" fill="#fdeaec" stroke="#e63946" stroke-width="1"/>
  <text x="140" y="254" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1a1a">Control</text>
  <text x="140" y="273" text-anchor="middle" font-size="12" fill="#6b6b6b">ничего не меняли</text>

  <!-- результаты справа -->
  <rect x="450" y="50" width="200" height="60" rx="2" fill="#f1efe8" stroke="#d4d4d0" stroke-width="1"/>
  <text x="550" y="74" text-anchor="middle" font-size="13.5" font-weight="600" fill="#1a1a1a">Получает водителей</text>
  <text x="550" y="93" text-anchor="middle" font-size="12" fill="#6b6b6b">ожидание 6.2 мин</text>

  <rect x="450" y="230" width="200" height="60" rx="2" fill="#fdeaec" stroke="#e63946" stroke-width="1"/>
  <text x="550" y="254" text-anchor="middle" font-size="13.5" font-weight="600" fill="#1a1a1a">Водителей не хватает</text>
  <text x="550" y="273" text-anchor="middle" font-size="12" fill="#6b6b6b">ожидание 9.6 мин</text>

  <!-- стрелки: обе группы тянут из пула -->
  <line x1="240" y1="86" x2="270" y2="140" stroke="#6b6b6b" stroke-width="1.4" marker-end="url(#arm)"/>
  <line x1="240" y1="254" x2="270" y2="200" stroke="#6b6b6b" stroke-width="1.4" marker-end="url(#arm)"/>

  <!-- пул раздаёт водителей: больше treatment, меньше control -->
  <line x1="410" y1="150" x2="448" y2="86" stroke="#1a1a1a" stroke-width="2" marker-end="url(#arm)"/>
  <line x1="410" y1="190" x2="448" y2="254" stroke="#e63946" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arm)"/>

  <text x="340" y="316" text-anchor="middle" font-size="12" fill="#6b6b6b">treatment перехватывает общих водителей — контроль страдает, хотя ему ничего не меняли</text>
</svg>
