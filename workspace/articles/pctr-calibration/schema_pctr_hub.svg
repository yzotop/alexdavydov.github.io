<svg viewBox="0 0 680 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="tp dp" font-family="Manrope, system-ui, sans-serif">
  <title id="tp">pCTR-модель — точка схождения трёх процессов</title>
  <desc id="dp">Предсказанная вероятность клика (pCTR) одновременно является ML-моделью, которую нужно оценивать (AI-evals), напрямую определяет выручку через eCPM (монетизация) и меняется через эксперименты (A/B). Калибровка — общее свойство, связывающее все три.</desc>
  <defs>
    <marker id="arp" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="250" y="128" width="180" height="64" rx="2" fill="#fdeaec" stroke="#e63946" stroke-width="1.5"/>
  <text x="340" y="153" text-anchor="middle" font-size="15" font-weight="600" fill="#1a1a1a">pCTR-модель</text>
  <text x="340" y="174" text-anchor="middle" font-size="12" fill="#6b6b6b">eCPM = bid × pCTR</text>

  <rect x="40" y="40" width="220" height="58" rx="2" fill="#faeeda" stroke="#b9791f" stroke-width="1"/>
  <text x="150" y="64" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1a1a">AI-evals</text>
  <text x="150" y="83" text-anchor="middle" font-size="12" fill="#6b6b6b">это ML-модель — оценить</text>

  <rect x="420" y="40" width="220" height="58" rx="2" fill="#e1f5ee" stroke="#0f6e56" stroke-width="1"/>
  <text x="530" y="64" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1a1a">Монетизация</text>
  <text x="530" y="83" text-anchor="middle" font-size="12" fill="#6b6b6b">определяет выручку</text>

  <rect x="230" y="248" width="220" height="58" rx="2" fill="#e6f1fb" stroke="#185fa5" stroke-width="1"/>
  <text x="340" y="272" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1a1a">A/B-эксперименты</text>
  <text x="340" y="291" text-anchor="middle" font-size="12" fill="#6b6b6b">меняют через тесты</text>

  <line x1="270" y1="135" x2="180" y2="100" stroke="#6b6b6b" stroke-width="1.2" marker-end="url(#arp)"/>
  <line x1="410" y1="135" x2="500" y2="100" stroke="#6b6b6b" stroke-width="1.2" marker-end="url(#arp)"/>
  <line x1="340" y1="192" x2="340" y2="246" stroke="#6b6b6b" stroke-width="1.2" marker-end="url(#arp)"/>

  <text x="340" y="225" text-anchor="middle" font-size="11.5" fill="#6b6b6b" font-style="italic">связывает всё — калибровка</text>
</svg>
