<?xml version="1.0" encoding="utf-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" font-family="'DejaVu Sans', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1 1L9 5L1 9" fill="none" stroke="#1a1a1a" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- column labels -->
  <text x="40" y="30" font-size="11" fill="#6b6b6b" letter-spacing="0.5">ВХОД</text>
  <text x="290" y="30" font-size="11" fill="#6b6b6b" letter-spacing="0.5">РЕЖИМ РАССУЖДЕНИЯ</text>
  <text x="560" y="30" font-size="11" fill="#6b6b6b" letter-spacing="0.5">ВЫХОД</text>

  <!-- input: contract -->
  <rect x="40" y="44" width="170" height="50" fill="none" stroke="#d4d4d0" stroke-width="1"/>
  <text x="125" y="68" font-size="13" fill="#1a1a1a" text-anchor="middle">Контракт</text>
  <text x="125" y="84" font-size="11" fill="#6b6b6b" text-anchor="middle">пороги, guardrails</text>

  <!-- input: data -->
  <rect x="40" y="106" width="170" height="50" fill="none" stroke="#d4d4d0" stroke-width="1"/>
  <text x="125" y="130" font-size="13" fill="#1a1a1a" text-anchor="middle">Данные</text>
  <text x="125" y="146" font-size="11" fill="#6b6b6b" text-anchor="middle">таблица результатов</text>

  <line x1="210" y1="100" x2="282" y2="100" stroke="#1a1a1a" stroke-width="1" marker-end="url(#ar)"/>

  <!-- mode: free -->
  <rect x="290" y="44" width="180" height="50" fill="none" stroke="#1a1a1a" stroke-width="1"/>
  <text x="380" y="68" font-size="13" fill="#1a1a1a" text-anchor="middle">Свободно</text>
  <text x="380" y="84" font-size="11" fill="#6b6b6b" text-anchor="middle">реши и ответь</text>

  <!-- mode: sgr (accent border) -->
  <rect x="290" y="106" width="180" height="50" fill="none" stroke="#e63946" stroke-width="1.4"/>
  <text x="380" y="130" font-size="13" fill="#1a1a1a" text-anchor="middle">По схеме</text>
  <text x="380" y="146" font-size="11" fill="#6b6b6b" text-anchor="middle">5 проверок по порядку</text>

  <line x1="470" y1="100" x2="542" y2="100" stroke="#1a1a1a" stroke-width="1" marker-end="url(#ar)"/>

  <!-- output -->
  <rect x="550" y="44" width="130" height="112" fill="none" stroke="#d4d4d0" stroke-width="1"/>
  <text x="615" y="70" font-size="13" fill="#1a1a1a" text-anchor="middle">Вердикт</text>
  <text x="615" y="92" font-size="11" fill="#6b6b6b" text-anchor="middle">ship / no-ship</text>
  <text x="615" y="108" font-size="11" fill="#6b6b6b" text-anchor="middle">/ investigate</text>
  <text x="615" y="130" font-size="11" fill="#6b6b6b" text-anchor="middle">+ механизм</text>
  <text x="615" y="146" font-size="11" fill="#6b6b6b" text-anchor="middle">+ уверенность</text>

  <!-- five checks band -->
  <rect x="40" y="196" width="640" height="62" fill="none" stroke="#d4d4d0" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="58" y="220" font-size="12" fill="#1a1a1a">Пять проверок режима «по схеме»</text>
  <text x="58" y="240" font-size="11" fill="#6b6b6b">значимость → практическая величина → guardrails → сегменты → риск разворота</text>

  <!-- to comparison -->
  <line x1="615" y1="156" x2="615" y2="300" stroke="#1a1a1a" stroke-width="1" marker-end="url(#ar)"/>
  <rect x="470" y="300" width="210" height="44" fill="none" stroke="#e63946" stroke-width="1"/>
  <text x="575" y="320" font-size="13" fill="#1a1a1a" text-anchor="middle">Сравнение с эталоном</text>
  <text x="575" y="336" font-size="11" fill="#6b6b6b" text-anchor="middle">точность, честность</text>

  <text x="40" y="318" font-size="11" fill="#6b6b6b">Эталон кейса модель</text>
  <text x="40" y="334" font-size="11" fill="#6b6b6b">не видит — только вход.</text>
</svg>
