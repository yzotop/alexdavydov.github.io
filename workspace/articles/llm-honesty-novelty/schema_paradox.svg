<?xml version="1.0" encoding="utf-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" font-family="'DejaVu Sans', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="ar2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1 1L9 5L1 9" fill="none" stroke="#1a1a1a" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="ar2r" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1 1L9 5L1 9" fill="none" stroke="#e63946" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- left: two input types -->
  <text x="40" y="30" font-size="11" fill="#6b6b6b" letter-spacing="0.5">ТИП КЕЙСА</text>

  <rect x="40" y="46" width="190" height="64" fill="none" stroke="#d4d4d0" stroke-width="1"/>
  <text x="135" y="72" font-size="13" fill="#1a1a1a" text-anchor="middle">Тревожный</text>
  <text x="135" y="92" font-size="11" fill="#6b6b6b" text-anchor="middle">цифры мутные, незначимо</text>

  <rect x="40" y="210" width="190" height="64" fill="none" stroke="#d4d4d0" stroke-width="1"/>
  <text x="135" y="236" font-size="13" fill="#1a1a1a" text-anchor="middle">Соблазнительный</text>
  <text x="135" y="256" font-size="11" fill="#6b6b6b" text-anchor="middle">+4%, значимо, красиво</text>

  <!-- converging arrows to shared deficit -->
  <line x1="230" y1="78" x2="295" y2="150" stroke="#1a1a1a" stroke-width="1" marker-end="url(#ar2)"/>
  <line x1="230" y1="242" x2="295" y2="170" stroke="#1a1a1a" stroke-width="1" marker-end="url(#ar2)"/>

  <!-- center: shared deficit -->
  <rect x="300" y="128" width="160" height="64" fill="none" stroke="#1a1a1a" stroke-width="1.4"/>
  <text x="380" y="154" font-size="12" fill="#1a1a1a" text-anchor="middle">Один дефицит:</text>
  <text x="380" y="174" font-size="12" fill="#1a1a1a" text-anchor="middle">сигнала нет в данных</text>

  <!-- diverging arrows to opposite verdicts -->
  <line x1="460" y1="150" x2="525" y2="78" stroke="#1a1a1a" stroke-width="1" marker-end="url(#ar2)"/>
  <line x1="460" y1="170" x2="525" y2="242" stroke="#e63946" stroke-width="1.4" marker-end="url(#ar2r)"/>

  <!-- right: opposite outcomes -->
  <text x="530" y="30" font-size="11" fill="#6b6b6b" letter-spacing="0.5">РЕШЕНИЕ</text>

  <rect x="530" y="46" width="160" height="64" fill="none" stroke="#1a1a1a" stroke-width="1"/>
  <text x="610" y="72" font-size="13" fill="#1a1a1a" text-anchor="middle">Честный отказ</text>
  <text x="610" y="92" font-size="11" fill="#6b6b6b" text-anchor="middle">no-ship · 0/30</text>

  <rect x="530" y="210" width="160" height="64" fill="none" stroke="#e63946" stroke-width="1.4"/>
  <text x="610" y="236" font-size="13" fill="#1a1a1a" text-anchor="middle">Уверенный запуск</text>
  <text x="610" y="256" font-size="11" fill="#e63946" text-anchor="middle">ship · 30/30</text>
</svg>
