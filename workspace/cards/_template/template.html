<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Card Template</title>
  <link rel="stylesheet" href="../_shared/fonts.css">
  <link rel="stylesheet" href="../_shared/cards.css">
</head>
<body>

  <!-- ─── Card 1 of N ─────────────────────────────────────────── -->
  <div class="card">

    <!-- Mono kicker: slide counter + section name -->
    <div class="card-meta">
      <span class="accent">01 / 05</span> · § НАЗВАНИЕ РАЗДЕЛА
    </div>

    <!-- Main heading — 'Sans Wide' family (Space Grotesk latin + Manrope cyrillic) -->
    <h1 class="card-title">Заголовок карточки</h1>

    <!-- Lede — 1–3 sentences, the core idea -->
    <p class="card-lede">Лид-абзац: главная мысль карточки. Коротко, ёмко, без вводных конструкций. Читатель должен понять суть за 5 секунд.</p>

    <!-- Body content: choose one pattern from the examples below -->

    <!--
    PATTERN A — plain paragraph text
    <div class="card-body">
      <p>Основной текст карточки. Один-два абзаца, не больше.</p>
      <p>Второй абзац если нужен.</p>
    </div>
    -->

    <!--
    PATTERN B — numbered list
    <ul class="card-list">
      <li><span class="num">01</span><span>Первый пункт списка — коротко</span></li>
      <li><span class="num">02</span><span>Второй пункт</span></li>
      <li><span class="num">03</span><span>Третий пункт</span></li>
    </ul>
    -->

    <!--
    PATTERN C — stat block
    <div class="card-stats">
      <div class="card-stat">
        <span class="stat-value">+12%</span>
        <span class="stat-label">прирост метрики X после изменения Y</span>
      </div>
      <div class="card-stat">
        <span class="stat-value">3×</span>
        <span class="stat-label">рост показателя Z в сегменте A</span>
      </div>
    </div>
    -->

    <!-- Insight box — always present, always at the bottom -->
    <div class="insight">
      <div class="insight-label">Главный вывод</div>
      <p class="insight-text">
        Главная мысль карточки одной фразой. <strong>Ключевое слово выделено bold.</strong>
      </p>
      <div class="insight-footer">
        <span>davydov.my</span>
        <span class="footer-num">01 / 05</span>
      </div>
    </div>

  </div>

</body>
</html>
