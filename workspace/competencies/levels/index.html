    <style>
        /* ── Page typography (JS renders h1 + .subtitle inside #app) ── */
        h1 {
            font-size: 1.9rem;
            font-weight: 600;
            color: var(--ink);
            margin: 0 0 .5rem 0;
            line-height: 1.2;
        }
        .subtitle {
            color: var(--muted);
            font-size: .95rem;
            line-height: 1.6;
            margin-bottom: 2.5rem;
        }

        /* ── Level cards grid ────────────────────────────────── */
        .levels-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 24px;
            margin-bottom: 3rem;
        }
        @media (min-width: 640px) {
            .levels-grid { grid-template-columns: repeat(2, 1fr); }
        }

        .level-card {
            border: 1px solid var(--line);
            padding: 28px;
            background: transparent;
            display: flex;
            flex-direction: column;
        }

        /* ── Badge (JUNIOR / MIDDLE / …) ─────────────────────── */
        .level-badge {
            font-family: var(--mono);
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: .06em;
            color: var(--muted);
            border: 1px solid var(--line);
            padding: 3px 8px;
            display: inline-block;
            align-self: flex-start;
            margin-bottom: 14px;
        }

        /* ── Card title ──────────────────────────────────────── */
        .level-title {
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--ink);
            margin: 0 0 20px 0;
            line-height: 1.3;
        }

        /* ── Section labels ──────────────────────────────────── */
        .level-section-label {
            font-family: var(--mono);
            font-size: 10px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: .06em;
            color: var(--muted);
            margin-top: 18px;
            margin-bottom: 6px;
        }
        .level-section-label:first-of-type { margin-top: 0; }

        /* "Что НЕ ожидается" — единственный красный акцент */
        .level-section-label.label-error   { color: var(--accent); }
        /* warning, growth → просто muted (без orange/green) */
        .level-section-label.label-warning { color: var(--muted); }
        .level-section-label.label-growth  { color: var(--muted); }

        /* ── Bullet lists ────────────────────────────────────── */
        .level-bullets {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .level-bullets li {
            font-size: .875rem;
            line-height: 1.55;
            color: var(--ink);
            padding-left: 14px;
            position: relative;
            margin-bottom: 4px;
        }
        .level-bullets li::before {
            content: '·';
            position: absolute;
            left: 0;
            color: var(--muted);
        }

        /* ── Quick-check ─────────────────────────────────────── */
        .quick-check {
            margin-top: 20px;
            padding: 16px 20px;
            background: var(--soft);
            border-left: 2px solid var(--line);
        }
        .quick-check-label {
            font-family: var(--mono);
            font-size: 10px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: .06em;
            color: var(--muted);
            margin-bottom: 8px;
        }
        .quick-check-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .quick-check-list li {
            font-size: .85rem;
            line-height: 1.5;
            color: var(--ink);
            padding-left: 16px;
            position: relative;
            margin-bottom: 3px;
        }
        .quick-check-list li::before {
            content: '☐';
            position: absolute;
            left: 0;
            color: var(--muted);
            font-size: .75rem;
        }

        /* ── Transition note (Lead card) ─────────────────────── */
        .transition-note {
            font-size: .85rem;
            color: var(--muted);
            line-height: 1.55;
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid var(--line);
        }
        .transition-note a {
            color: var(--ink);
            text-decoration: underline;
            text-underline-offset: 3px;
            text-decoration-color: var(--line);
        }
        .transition-note a:hover { text-decoration-color: var(--ink); }

        /* ── Sources ─────────────────────────────────────────── */
        .sources {
            margin-bottom: 3rem;
            padding: 20px;
            border: 1px solid var(--line);
        }
        .sources h2 {
            font-family: var(--mono);
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: .06em;
            color: var(--muted);
            margin-bottom: 12px;
        }
        .sources ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .sources li {
            font-size: .875rem;
            color: var(--ink);
            margin-bottom: 6px;
            padding-left: 14px;
            position: relative;
        }
        .sources li::before {
            content: '·';
            position: absolute;
            left: 0;
            color: var(--muted);
        }
        .sources a {
            color: var(--ink);
            text-decoration: underline;
            text-underline-offset: 3px;
            text-decoration-color: var(--line);
        }
        .sources a:hover { text-decoration-color: var(--ink); }

        /* ── Mobile ──────────────────────────────────────────── */
        @media (max-width: 639px) {
            .level-card  { padding: 20px; }
            .quick-check { padding: 14px 16px; }
        }
    </style>
</head>
