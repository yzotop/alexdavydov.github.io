    <style>
        /* ── Page typography (JS renders h1 + .subtitle inside #app) ── */
        h1 {
            font-size: 1.9rem;
            font-weight: 600;
            color: var(--ink);
            margin: 0 0 .5rem 0;
            line-height: 1.2;
        }
        .subtitle {
            color: var(--muted);
            font-size: .95rem;
            line-height: 1.6;
            margin-bottom: 2.5rem;
        }

        /* ── Section headers ─────────────────────────────────── */
        h2 {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--ink);
            margin: 2.5rem 0 1rem 0;
        }
        h2:first-of-type { margin-top: 0; }

        .section-text {
            font-size: .9rem;
            color: var(--muted);
            line-height: 1.55;
            margin-bottom: 1rem;
        }

        /* ── Callout bullets ─────────────────────────────────── */
        .content-bullets {
            list-style: none;
            padding: 0;
            margin: 0 0 2.5rem 0;
        }
        .content-bullets li {
            font-size: .9rem;
            line-height: 1.6;
            color: var(--ink);
            padding: 14px 0 14px 16px;
            border-bottom: 1px solid var(--line);
            position: relative;
        }
        .content-bullets li:last-child { border-bottom: none; }
        .content-bullets li::before {
            content: '·';
            position: absolute;
            left: 0;
            top: 14px;
            color: var(--muted);
        }

        /* ── Responsibility table ────────────────────────────── */
        .responsibility-table {
            width: 100%;
            border-collapse: collapse;
            margin: 0 0 2.5rem 0;
        }
        .responsibility-table th {
            text-align: left;
            font-family: var(--mono);
            font-size: 10px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: .06em;
            color: var(--muted);
            padding: 10px 14px;
            border-bottom: 2px solid var(--ink);
            background: transparent;
        }
        .responsibility-table td {
            padding: 12px 14px;
            border-bottom: 1px solid var(--line);
            vertical-align: top;
            font-size: .875rem;
            line-height: 1.5;
            color: var(--ink);
        }
        .responsibility-table tr:last-child td { border-bottom: none; }
        .responsibility-table td:first-child { font-weight: 500; }
        .responsibility-table td:nth-child(3) { color: var(--muted); }

        /* ── Antipatterns ────────────────────────────────────── */
        .antipattern-list {
            list-style: none;
            padding: 0;
            margin: 0 0 2.5rem 0;
        }
        .antipattern-list li {
            font-size: .9rem;
            line-height: 1.6;
            color: var(--ink);
            padding: 14px 0 14px 24px;
            border-bottom: 1px solid var(--line);
            position: relative;
        }
        .antipattern-list li:last-child { border-bottom: none; }
        .antipattern-list li::before {
            content: '✕';
            position: absolute;
            left: 0;
            top: 15px;
            color: var(--accent);
            font-size: .8rem;
            font-weight: 600;
        }
        .antipattern-list li strong { font-weight: 600; }

        /* ── CTA block ───────────────────────────────────────── */
        .cta-block {
            margin: 2.5rem 0;
            padding: 28px 32px;
            background: var(--soft);
            border-left: 3px solid var(--ink);
        }
        .cta-block h3 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--ink);
            margin: 0 0 10px 0;
        }
        .cta-block p {
            font-size: .9rem;
            color: var(--ink);
            line-height: 1.55;
            margin: 0 0 16px 0;
        }
        .cta-button {
            display: inline-block;
            font-family: var(--mono);
            font-size: 12px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: .05em;
            color: var(--ink);
            text-decoration: underline;
            text-underline-offset: 3px;
            text-decoration-color: var(--line);
            border: none;
            background: none;
            padding: 0;
        }
        .cta-button:hover { text-decoration-color: var(--ink); }

        /* ── Sources ─────────────────────────────────────────── */
        .sources {
            margin-bottom: 3rem;
            padding: 20px;
            border: 1px solid var(--line);
        }
        .sources h2 {
            font-family: var(--mono);
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: .06em;
            color: var(--muted);
            margin: 0 0 12px 0;
        }
        .sources ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .sources li {
            font-size: .875rem;
            color: var(--ink);
            margin-bottom: 6px;
            padding-left: 14px;
            position: relative;
        }
        .sources li::before {
            content: '·';
            position: absolute;
            left: 0;
            color: var(--muted);
        }
        .sources a {
            color: var(--ink);
            text-decoration: underline;
            text-underline-offset: 3px;
            text-decoration-color: var(--line);
        }
        .sources a:hover { text-decoration-color: var(--ink); }

        /* ── Mobile ──────────────────────────────────────────── */
        @media (max-width: 639px) {
            .responsibility-table th,
            .responsibility-table td { padding: 10px 8px; }
            .cta-block { padding: 20px 24px; }
        }
    </style>
</head>
