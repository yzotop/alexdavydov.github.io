<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Фон -->
  <rect width="1200" height="630" fill="#fafafa"/>
  <!-- Тонкая рамка -->
  <rect x="1" y="1" width="1198" height="628" fill="none" stroke="#e5e5e5" stroke-width="1"/>

  <!-- Logo mark: чёрный квадрат + белая Δ -->
  <rect x="80" y="72" width="48" height="48" rx="6" fill="#111"/>
  <text x="104" y="106" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif"
        font-size="24" font-weight="700" fill="#fff">Δ</text>

  <!-- DAVYDOV.MY -->
  <text x="144" y="104"
        font-family="system-ui,-apple-system,sans-serif"
        font-size="18" font-weight="600" fill="#111"
        letter-spacing="1">DAVYDOV.MY</text>

  <!-- Заголовок -->
  <text x="80" y="340"
        font-family="system-ui,-apple-system,sans-serif"
        font-size="80" font-weight="700" fill="#111">Аналитика продукта</text>

  <!-- Подзаголовок -->
  <text x="80" y="408"
        font-family="system-ui,-apple-system,sans-serif"
        font-size="32" font-weight="400" fill="#737373">Читать систему, а не цифры · Junior→Senior</text>
</svg>
